# scripts/suppliers/comportal/config/filter.yml
# ComPortal → whitelist по выбранным пользователем категориям.
# Ветки Акции / Уцененные сюда намеренно НЕ включены.

mode: include

allowed_category_ids:
  - 8052  # Ноутбуки
  - 8048  # Мониторы
  - 8030  # Моноблоки
  - 8031  # Настольные ПК
  - 8073  # Проекторы
  - 8032  # Рабочие станции

  - 8034  # Лазерные монохромные МФУ
  - 8037  # Лазерные монохромные принтеры
  - 8035  # Лазерные цветные МФУ
  - 8038  # Лазерные цветные принтеры
  - 8036  # Сканеры
  - 8039  # Струйные МФУ
  - 8074  # Струйные принтеры
  - 8040  # Широкоформатные принтеры

  - 8043  # Картриджи для лазерных устройств
  - 8044  # Картриджи для струйных устройств
  - 8046  # Картриджи для широкоформатных устройств
  - 8062  # Прочие расходные материалы
  - 8047  # Тонеры

  - 8065  # Батареи. аккумуляторы
  - 8063  # ИБП
  - 8064  # Стабилизаторы

report:
  include_branches:
    - "Ноутбуки и ПК"
    - "Печатная техника"
    - "Расходные материалы"
    - "ИБП и питание"

notes:
  exclude_roots_implicitly:
    - 8028  # Акции
    - 8029  # Уцененные
