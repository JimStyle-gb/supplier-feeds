drop_keys_casefold:
- артикул
- штрихкод
- код тн вэд
- код товара kaspi
- код товара kaspi.kz
- благотворительность
- снижена цена
- новинка
- короткое наименование (каз)
- полное наименование (каз)
- назначение
- безопасность
- код нкт
- 'код нкт:'
- код нкт/gtin
aliases_casefold:
  мощность (bт): Мощность (Вт)
value_normalizers:
