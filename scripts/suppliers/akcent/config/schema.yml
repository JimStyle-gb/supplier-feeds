schema_version: 2
supplier: AkCent

# Узкий поток только под утверждённый ассортимент
kind_by_name_prefix:
  C13T55: consumable
  Ёмкость для отработанных чернил: consumable
  Картридж: consumable
  Чернила: consumable
  Экономичный набор: consumable
  Интерактивная доска: interactive
  Интерактивная панель: interactive
  Интерактивный дисплей: interactive
  Монитор: monitor
  Экран: screen
  МФУ: mfp_printer_scanner
  Принтер: mfp_printer_scanner
  Сканер: mfp_printer_scanner
  Плоттер: plotter
  Проектор: projector
  Ламинатор: lamination
  Пленка для ламинирования: lamination
  Переплетчик: binder
  Шредер: shredder

unknown_keys: to_extra_info
extra_info_limit: 8

