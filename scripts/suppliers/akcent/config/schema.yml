schema_version: 1
supplier: akcent

key_rules:
  must_contain_letter: true
  max_len: 60
  max_words: 9
  banned_exact:
    - "Normal"
    - "From"
    - "To"
    - "Артикул"
    - "Штрихкод"
    - "Код товара"
    - "SKU"
    - "Offer_ID"
    - "Сопутствующие товары"

# Ключи, которые НЕ хотим ни в param, ни в "доп. данные" (шум/дубли).
discard_exact:
  - "Вид"
  - "Страна происхождения"

# Алиасы -> канонический ключ (под твой XML+raw r20)
aliases:
  # warranty
  "Warranty": "Гарантия"
  "Гарантия (мес)": "Гарантия"
  "Гарантия на ножи, лет": "Гарантия (ножи)"

  # model
  "Наименование производителя": "Модель"

  # interfaces
  "Интерфейс": "Интерфейсы"
  "Интерфейс подключения": "Интерфейсы"
  "Тип интерфейса": "Интерфейсы"

  # dpi / print-scan
  "Разрешение печати,dpi": "Разрешение печати, dpi"
  "Разрешение печати,dpi ": "Разрешение печати, dpi"
  "Разрешение печати, dpi": "Разрешение печати, dpi"
  "Разрешение сканера,dpi": "Разрешение сканера, dpi"
  "Разрешение сканера, dpi": "Разрешение сканера, dpi"
  "Интерполяционное разрешение, dpi": "Интерполяционное разрешение, dpi"
  "Максимальное разрешение, dpi": "Максимальное разрешение, dpi"

  # speed / paper density
  "Максимальная скорость печати А4 стр/мин": "Скорость печати (A4)"
  "Минимальная плотность бумаги, г/м2": "Минимальная плотность бумаги, г/м²"
  "Минимальная плотность бумаги, г/м²": "Минимальная плотность бумаги, г/м²"
  "Максимальная плотность бумаги, г/м2": "Максимальная плотность бумаги, г/м²"
  "Максимальная плотность бумаги, г/м²": "Максимальная плотность бумаги, г/м²"

  # screens
  "Размер дм.(м.)": "Размер"
  "Формат": "Соотношение сторон"

  # monitors
  "Диагональ экрана, дюйм": "Диагональ"
  "Диагональ экрана, дюймов": "Диагональ"
  "Диагональ экрана, см": "Диагональ (см)"
  "Разрешение экрана": "Разрешение"
  "Время отклика (GTG)": "Время отклика"
  "Частота обновления (Макс.)": "Частота обновления"
  "Динамическая контрастность": "Контрастность (динамическая)"

  # projectors: inputs
  "Видео вход HDMI": "HDMI"
  "Видео вход VGA": "VGA"
  "Видео вход S-video": "S-Video"
  "Видео вход DisplayPort": "DisplayPort"
  "Видео вход DVI-D": "DVI-D"
  "Ethernet (RJ-45)": "Ethernet"

  # weights naming from desc kv
  "Вес в упак.": "Вес (в упак.)"
  "Вес без упак.": "Вес (без упак.)"

sources:
  xml_param:
    enabled: true
  desc_kv_block:
    enabled: true
    min_kv_lines: 5
    split_by_first_colon: true
    allow_keys_must_pass_key_rules: true

# Определение kind ТОЛЬКО по префиксу name (как фильтр)
kind_by_name_prefix:
  consumable:
    - "C13T55"
    - "Ёмкость для отработанных чернил"
    - "Картридж"
    - "Чернила"
    - "Экономичный набор"
  projector:
    - "Проектор"
  screen:
    - "Экран"
  monitor:
    - "Монитор"
  interactive:
    - "Интерактивная доска"
    - "Интерактивная панель"
