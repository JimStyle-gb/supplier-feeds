# Жёстко выкидываем служебные и мусорные ключи
# (чтобы не тянуть narrative в param-ы)
discard_exact:
  - Описание
  - Характеристики
  - Комплектация
  - Сопутствующие товары
  - Дополнительно
  - Примечание
  - Примечания
  - Общие характеристики
  - Общие характерстики
  - Технологии
  - Other features
  - Advanced Features
  - 2D Colour Modes
  - Video Color Modes
  - Room Type / Application
  - Positioning
  - Supported Temperature
  - Supported Humidity
  - Supply Voltage
  - Lens
  - Optical
  - Projection Lens F Number
  - Projection Lens Focal Length
  - Projection Lens Focus
  - Colour Video Processing
  - 2D Vertical Refresh Rate
  - Colour Reproduction
  - Minimum object size
  - Панель управления
  - Индикатор состояния
  - Минимальный размер объекта

banned_exact:
  - CRC
  - Retail BarCode (EU)
  - Retail Barcode (EU)
  - EAN
  - GTIN
  - SKU
  - Barcode

