schema_version: 1
supplier: akcent
key_rules:
  must_contain_letter: true
  max_len: 60
  max_words: 9
  banned_exact:
  - Normal
  - From
  - To
  - Артикул
  - Штрихкод
  - Код товара
  - SKU
  - Offer_ID
  - Сопутствующие товары
discard_exact:
- Страна происхождения
- Производитель
