value_normalizers:
  "*":
    - "trim"
    - "collapse_spaces"
    - "dash_ranges"
  "Интерфейсы":
    - "interfaces_cleanup"
  "Гарантия":
    - "warranty_to_months"
    - "warranty_drop_zero"

dedupe_rules:
  "Гарантия": "prefer_months_max"
  "*": "keep_first"

# Если ключ валиден, но не разрешён — НЕ делаем param. В v1 складываем в extra_info_kv.
unknown_keys:
  action: "to_extra_info"
  max_pairs: 20

# Коды/Совместимость — строго (без free text)
codes_compat:
  mode: "strict"
  allow_extract_from_free_text: false
  codes_keys:
    - "Коды"
    - "OEM"
    - "Part number"
    - "Codes"
    - "Совместимые продукты"
  compat_keys:
    - "Совместимость"
    - "Подходит для"
  # если в compat прилетели только коды — переносим в Коды
  move_compat_if_only_codes: true
  allow_model_equals_code_pairs: true

  # паттерны токенов кодов (под твой XML Ware02224)
  code_token_patterns:
    - "\bC13T\d{5,6}[A-Z]?\b"
    - "\bC12C\d{6,9}\b"
    - "\bC11[A-Z0-9]{6,10}\b"
    - "\bV1[123]H[A-Z0-9]{5,10}\b"
    - "\bW\d{4}[A-Z]\b"
    - "\b[A-Z]{1,2}\d{3,4}[A-Z]\b"
