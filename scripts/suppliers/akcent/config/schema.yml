value_normalizers:
  '*':
  - trim
  - collapse_spaces
  - dash_ranges
  Интерфейсы:
  - interfaces_cleanup
  Гарантия:
  - warranty_to_months
  - warranty_drop_zero
  Объем:
  - volume_drop_zero
  Объём:
  - volume_drop_zero
dedupe_rules:
  Гарантия: prefer_months_max
  '*': keep_first
unknown_keys:
  action: to_extra_info
  max_pairs: 20
codes_compat:
  mode: strict
  allow_extract_from_free_text: false
  codes_keys:
  - Коды
  - OEM
  - Part number
  - Codes
  - Совместимые продукты
  compat_keys:
  - Совместимость
  - Подходит для
  move_compat_if_only_codes: true
  allow_model_equals_code_pairs: true
  code_token_patterns:
  - \bC13T\d{5,6}[A-Z]?\b
  - \bC12C\d{6,9}\b
  - \bC11[A-Z0-9]{6,10}\b
  - \bV1[123]H[A-Z0-9]{5,10}\b
  - \bW\d{4}[A-Z]\b
  - \b[A-Z]{1,2}\d{3,4}[A-Z]\b
