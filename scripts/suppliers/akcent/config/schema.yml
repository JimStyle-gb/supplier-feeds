unknown_keys:
  action: to_extra_info
  max_pairs: 20

key_rules:
  must_contain_letter: true
  max_len: 80
  max_words: 8
  banned_exact:
    - id
    - article
    - sku
    - url
    - link
    - ссылка
    - offer id
    - offer_id
    - id товара
    - код товара
    - category
    - categoryid
    - category id
    - stock
    - остаток
    - остатки
    - наличие
    - picture
    - image
    - фото
    - картинка
    - изображение
    - price
    - цена
    - закупочная цена
    - purchase price

discard_exact:
  - Артикул
  - article
  - SKU
  - sku
  - Код товара
  - ID
  - Url
  - URL
  - Ссылка
  - Остаток
  - Остатки
  - Наличие
  - Picture
  - Image
  - Картинка
  - Изображение
  - Цена
  - Purchase price
  - Закупочная цена

dedupe_rules:
  "*": keep_first
  Гарантия: prefer_months_max
  Совместимость: merge_unique
  Коды расходников: merge_unique

value_normalizers:
  "*":
    - trim
    - collapse_spaces
    - dash_ranges

  Интерфейсы:
    - trim
    - collapse_spaces
    - interfaces_cleanup

  Гарантия:
    - trim
    - collapse_spaces
    - warranty_to_months
    - warranty_drop_zero

  Объем:
    - trim
    - collapse_spaces
    - volume_drop_zero

  Объем накопителя:
    - trim
    - collapse_spaces

  Мощность:
    - trim
    - collapse_spaces
    - dash_ranges

  Мощность (Вт):
    - trim
    - collapse_spaces
    - dash_ranges
