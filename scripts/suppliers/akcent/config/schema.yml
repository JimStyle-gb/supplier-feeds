# Качество ключей: короткие, не-предложения
key_rules:
  max_len: 48
  max_words: 6
  reject_sentence_like: true

# Нормализация значений по ключам
value_normalizers:
  Гарантия:
    - strip
    - unify_months
  Диагональ:
    - strip
    - keep_inches_or_cm
  Яркость:
    - strip
    - keep_lumen_value
  Яркость (ANSI) лмн:
    - strip
    - keep_integer
  Цветовая яркость:
    - strip
  Белая яркость:
    - strip
  Разрешение:
    - strip
    - drop_if_exact: ["Оригинальное", "Native", "Native Resolution", "Повышение разрешения"]
  Соотношение сторон:
    - strip
  Контрастность:
    - strip
  Источник света:
    - strip
  Тип источника света:
    - strip
  Проекционный коэффициент (Throw ratio):
    - strip
    - keep_ratio_or_range
  Проекционное расстояние:
    - strip
    - keep_distance_range
  Размер изображения:
    - strip
    - keep_inches_range
  Уровень шума (норм./эконом.) Дб:
    - strip
    - keep_db_range
  Энергопотребление:
    - strip
    - keep_watt_value
  Вес:
    - strip
    - keep_weight_value
  Габариты:
    - strip
    - keep_dimensions
  Интерфейсы:
    - strip
    - split_commas
  Число касаний:
    - strip
    - keep_integer_prefix
  Микрофоны:
    - strip
  Технология:
    - strip
  Стилус:
    - strip
  Цвет:
    - strip
  Коды:
    - strip
    - split_commas
