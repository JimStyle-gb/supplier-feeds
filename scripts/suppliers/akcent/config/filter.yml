schema_version: 1
supplier: akcent

# ТОЛЬКО фильтр по префиксам name (как в текущем build_akcent.py)
allow_name_prefixes:
  - "C13T55"
  - "Ёмкость для отработанных чернил"
  - "Интерактивная доска"
  - "Интерактивная панель"
  - "Интерактивный дисплей"
  - "Картридж"
  - "Ламинатор"
  - "Монитор"
  - "МФУ"
  - "Переплетчик"
  - "Пленка для ламинирования"
  - "Плоттер"
  - "Принтер"
  - "Проектор"
  - "Сканер"
  - "Чернила"
  - "Шредер"
  - "Экономичный набор"
  - "Экран"

# Точечные исключения по article (как в текущем build_akcent.py)
drop_articles:
  - "AWP201/10"
  - "AWP286/10"

# Исключение "картриджи для фильтра/бутылки" Philips AWP (как в текущем build_akcent.py)
# Формат: правило = AND по группам, внутри группы OR (any_of).
drop_rules:
  - all_groups:
      - any_of: ["картридж", "cartridge"]
      - any_of: ["фильтр", "filter", "бутылк", "bottle"]
      - any_of: ["philips", "awp"]
