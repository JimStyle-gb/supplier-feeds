# AkCent narrow assortment filter for CS-template supplier-layer
# v1: strict prefix-based include gate

supplier: akcent
mode: include

# Базовые требования входа
require_name: true
require_price: false

# Основной ассортиментный шлюз:
# товар должен начинаться ровно с одного из этих префиксов
include_rules:
  name_prefixes:
    - C13T55
    - Ёмкость для отработанных чернил
    - Интерактивная доска
    - Интерактивная панель
    - Интерактивный дисплей
    - Картридж
    - Ламинатор
    - Монитор
    - МФУ
    - Переплетчик
    - Пленка для ламинирования
    - Плоттер
    - Принтер
    - Проектор
    - Сканер
    - Чернила
    - Шредер
    - Экономичный набор
    - Экран

# Legacy-compatible alias for older filtering implementations
allow_name_prefixes:
  - C13T55
  - Ёмкость для отработанных чернил
  - Интерактивная доска
  - Интерактивная панель
  - Интерактивный дисплей
  - Картридж
  - Ламинатор
  - Монитор
  - МФУ
  - Переплетчик
  - Пленка для ламинирования
  - Плоттер
  - Принтер
  - Проектор
  - Сканер
  - Чернила
  - Шредер
  - Экономичный набор
  - Экран

exclude_rules:
  # Точечные article-исключения
  articles:
    - AWP201/10
    - AWP286/10

  # Исключаем "картриджи" для фильтров воды Philips/AWP
  grouped_name_conditions:
    - id: philips_awp_water_filter_cartridge
      all_of_any:
        - ["картридж", "cartridge"]
        - ["фильтр", "filter", "бутылк", "bottle"]
        - ["philips", "awp"]

# Legacy-compatible aliases
drop_articles:
  - AWP201/10
  - AWP286/10

water_filter_cartridge_exclusion:
  enabled: true
  groups:
    - ["картридж", "cartridge"]
    - ["фильтр", "filter", "бутылк", "bottle"]
    - ["philips", "awp"]

# Отчётность причин отсева должна сохраняться в filter_report
reporting:
  track_reasons: true
  top_reasons_limit: 20
