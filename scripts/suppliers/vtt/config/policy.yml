raw_must_be_clean: true
mutate_params: false
auto_codes_from_text: false
auto_compat_from_text: false
unknown_keys: drop
param_priority:
  - Тип
  - Для бренда
  - Коды расходников
  - Партномер
  - Совместимость
  - Технология печати
  - Цвет
  - Ресурс
  - Объем
  - Модель
quality_gate:
  enforce: false
  max_cosmetic_offers: 5
  max_cosmetic_issues: 5
  report_path: docs/raw/vtt_quality_gate.txt
  baseline_path: scripts/suppliers/vtt/config/quality_gate_baseline.yml
