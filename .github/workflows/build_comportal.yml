name: Build_ComPortal

on:
  workflow_dispatch:
  schedule:
    # Алматы UTC+5 -> 03:00 local = 22:00 UTC предыдущего дня
    - cron: "0 22 * * *"

permissions:
  contents: write

jobs:
  build_comportal:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: build_comportal
      cancel-in-progress: true

    env:
      TZ: Asia/Almaty
      COMPORTAL_LOGIN: ${{ secrets.COMPORTAL_LOGIN }}
      COMPORTAL_PASSWORD: ${{ secrets.COMPORTAL_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests beautifulsoup4 lxml pyyaml python-dateutil openpyxl
          fi

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare folders
        run: mkdir -p docs docs/raw

      - name: Smoke test
        run: |
          python -m py_compile             scripts/cs/core.py             scripts/build_comportal.py

      - name: Show build version
        run: |
          python - <<'PY'
          import re
          from pathlib import Path
          text = Path("scripts/build_comportal.py").read_text(encoding="utf-8", errors="ignore")
          m = re.search(r'BUILD_[A-Z_]+_VERSION\s*=\s*["\']([^"\']+)["\']', text)
          print("build_version:", m.group(1) if m else "unknown")
          PY

      - name: Snapshot previous feed
        run: |
          mkdir -p /tmp
          if [ -f docs/comportal.yml ]; then
            cp -f docs/comportal.yml /tmp/prev_comportal.yml
          else
            : > /tmp/prev_comportal.yml
          fi

      - name: Build feed (comportal)
        run: |
          python scripts/build_comportal.py

      - name: Diagnostics
        if: always()
        run: |
          git status --porcelain || true
          git diff --stat || true
          ls -la docs docs/raw || true
          wc -c docs/comportal.yml docs/raw/comportal.yml 2>/dev/null || true
          [ -f docs/raw/comportal_quality_gate.txt ] && sed -n '1,260p' docs/raw/comportal_quality_gate.txt || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comportal-build-output
          path: |
            docs/comportal.yml
            docs/raw/comportal.yml
            docs/raw/comportal_quality_gate.txt
          if-no-files-found: warn

      - name: Commit & push docs/comportal.yml
        if: success()
        run: |
          git add docs/comportal.yml docs/raw/comportal.yml
          if [ -f docs/raw/comportal_quality_gate.txt ]; then
            git add docs/raw/comportal_quality_gate.txt
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "build: comportal feed"
          git pull --rebase --autostash
          git push
