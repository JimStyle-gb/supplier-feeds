name: Build_VTT_Probe

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build-vtt-probe:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      TZ: Asia/Almaty
      VTT_BASE_URL: https://b2b.vtt.ru/
      VTT_LOGIN: ${{ secrets.VTT_LOGIN }}
      VTT_PASSWORD: ${{ secrets.VTT_PASSWORD }}
      VTT_PROBE_MAX_PAGES: 1200
      VTT_PROBE_DELAY: 0.05
      VTT_PROBE_MAX_PRODUCT_HTML: 80
      VTT_PROBE_MAX_PRODUCT_FETCH: 20000
      VTT_PROBE_FETCH_OFFSET: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Compile VTT probe files
        run: |
          python -m py_compile \
            scripts/build_vtt_probe.py \
            scripts/suppliers/vtt/client.py \
            scripts/suppliers/vtt/probe.py

      - name: Run VTT probe
        run: python scripts/build_vtt_probe.py

      - name: Show summary
        if: always()
        run: |
          echo '---- run_summary.json ----'
          cat docs/debug/vtt_probe/run_summary.json || true
          echo
          echo '---- inventory_summary.json ----'
          cat docs/debug/vtt_probe/inventory_summary.json || true
          echo
          echo '---- chunk_summary.json ----'
          cat docs/debug/vtt_probe/chunk_summary.json || true

      - name: Upload VTT probe artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vtt-probe-output
          path: docs/debug/vtt_probe/
          if-no-files-found: warn
