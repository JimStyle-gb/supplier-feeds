name: Build_VTT_Probe

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 1 *"

jobs:
  build-vtt-probe:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      TZ: Asia/Almaty
      VTT_BASE_URL: https://b2b.vtt.ru/
      VTT_LOGIN: ${{ secrets.VTT_LOGIN }}
      VTT_PASSWORD: ${{ secrets.VTT_PASSWORD }}
      VTT_PROBE_MAX_LISTING_PAGES: 4000
      VTT_PROBE_DELAY: 0.05
      VTT_PROBE_MAX_PRODUCT_HTML: 80

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Compile VTT probe files
        run: |
          python -m py_compile \
            scripts/build_vtt_probe.py \
            scripts/suppliers/vtt/client.py \
            scripts/suppliers/vtt/probe.py

      - name: Run VTT category probe
        run: python scripts/build_vtt_probe.py

      - name: Upload VTT probe output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vtt-probe-output
          path: docs/debug/vtt_probe/
