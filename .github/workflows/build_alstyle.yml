name: Build_AlStyle

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *'

permissions:
  contents: write

jobs:
  build_alstyle:
    runs-on: ubuntu-latest
    concurrency:
      group: build_alstyle
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests beautifulsoup4 lxml pyyaml python-dateutil openpyxl
          fi

      - name: Configure git identity (GitHub Actions bot)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Smoke test (py_compile)
        run: |
          python -m py_compile scripts/cs/core.py scripts/build_alstyle.py

      - name: Snapshot previous feed (for no-change detection)
        run: |
          mkdir -p /tmp
          if [ -f docs/alstyle.yml ]; then
            cp -f docs/alstyle.yml /tmp/prev_feed.yml
          else
            : > /tmp/prev_feed.yml
          fi

      - name: Build feed (alstyle)
        run: |
          python scripts/build_alstyle.py

      - name: Diagnostics (git status / diff / sizes)
        run: |
          git status --porcelain || true
          git diff --stat || true
          ls -la docs docs/raw || true
          wc -c docs/alstyle.yml docs/raw/alstyle.yml 2>/dev/null || true

      - name: Update FEED_META build time + next run (and mark no-changes)
        run: |
          # Считаем, изменились ли офферы (игнорируем <yml_catalog date=...> и блок FEED_META)
          norm_hash() {
            local f="$1"
            if [ ! -f "$f" ]; then
              echo ""
              return 0
            fi
            sed '/<!--FEED_META/,/-->/d' "$f" | sed '/^<yml_catalog date=/d' | md5sum | awk '{print $1}'
          }
          OLD_HASH=$(norm_hash /tmp/prev_feed.yml)
          NEW_HASH=$(norm_hash docs/alstyle.yml)
          NO_CHANGES=0
          if [ -n "$OLD_HASH" ] && [ -n "$NEW_HASH" ] && [ "$OLD_HASH" = "$NEW_HASH" ]; then
            NO_CHANGES=1
          fi

          # Текущее локальное время Алматы
          TS=$(TZ='Asia/Almaty' date '+%Y-%m-%d %H:%M:%S')
          NOTE=""
          if [ "$NO_CHANGES" -eq 1 ]; then
            NOTE=" (не было изменений)"
          fi
          # Следующий запуск (ежедневно в 01:00:00 по Алматы)
          # Важно: не используем epoch-конверсию (@EPOCH), чтобы не ловить сдвиги TZ на раннерах.
          NOW_HMS=$(TZ='Asia/Almaty' date '+%H%M%S')
          TODAY=$(TZ='Asia/Almaty' date '+%Y-%m-%d')
          if [ "$NOW_HMS" -ge "010000" ]; then
            NEXT_DATE=$(TZ='Asia/Almaty' date -d 'tomorrow' '+%Y-%m-%d')
          else
            NEXT_DATE="$TODAY"
          fi
          NEXT_RUN="${NEXT_DATE} 01:00:00"

          echo "FEED_META_TS=${TS}${NOTE}"
          echo "FEED_META_NEXT_RUN=${NEXT_RUN}"

          for F in docs/alstyle.yml docs/raw/alstyle.yml; do
            if [ ! -f "$F" ]; then
              continue
            fi

            # 1) Обновляем <yml_catalog date="...">
            sed -i -E "s/^<yml_catalog date=\"[^\"]+\">/<yml_catalog date=\"${TS}\">/" "$F" || true

            # 2) Обновляем строки FEED_META
            tmp="$F.__tmp"
            : > "$tmp"
            while IFS= read -r ln; do
              if [[ "$ln" == Время\ сборки\ \(Алматы\)* ]]; then
                left="${ln%%|*}"
                echo "${left}| ${TS}${NOTE}" >> "$tmp"
              elif [[ "$ln" == Ближайшая\ сборка\ \(Алматы\)* ]]; then
                left="${ln%%|*}"
                echo "${left}| ${NEXT_RUN}" >> "$tmp"
              else
                # если изменения появились — убираем старую пометку
                if [ "$NO_CHANGES" -eq 0 ]; then
                  echo "${ln// (не было изменений)/}" >> "$tmp"
                else
                  echo "$ln" >> "$tmp"
                fi
              fi
            done < "$F"
            mv "$tmp" "$F"
          done

          echo "CS_NO_CHANGES=$NO_CHANGES" >> $GITHUB_ENV

      - name: Commit & push docs/alstyle.yml (if changed)
        run: |
          git add docs/alstyle.yml docs/raw/alstyle.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "build: alstyle feed"
          git pull --rebase --autostash
          git push
