name: Build_AlStyle

on:
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * *'  # 02:00 Asia/Almaty

permissions:
  contents: write

jobs:
  build_alstyle:
    runs-on: ubuntu-latest
    concurrency:
      group: build_alstyle
      cancel-in-progress: true

    env:
      TZ: Asia/Almaty

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests beautifulsoup4 lxml pyyaml python-dateutil openpyxl
          fi

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare folders
        run: |
          mkdir -p docs docs/raw docs/debug

      - name: Smoke test
        run: |
          python - <<'PY'
          import py_compile
          import sys
          from pathlib import Path

          files = [
              "scripts/build_alstyle.py",
              "scripts/suppliers/__init__.py",
              "scripts/suppliers/alstyle/__init__.py",
              "scripts/suppliers/alstyle/models.py",
              "scripts/suppliers/alstyle/source.py",
              "scripts/suppliers/alstyle/filtering.py",
              "scripts/suppliers/alstyle/normalize.py",
              "scripts/suppliers/alstyle/params_xml.py",
              "scripts/suppliers/alstyle/desc_clean.py",
              "scripts/suppliers/alstyle/desc_extract.py",
              "scripts/suppliers/alstyle/compat.py",
              "scripts/suppliers/alstyle/pictures.py",
              "scripts/suppliers/alstyle/builder.py",
              "scripts/suppliers/alstyle/diagnostics.py",
              "scripts/suppliers/alstyle/quality_gate.py",
              "scripts/cs/core.py",
              "scripts/cs/writer.py",
              "scripts/cs/validators.py",
              "scripts/cs/util.py",
              "scripts/cs/pricing.py",
              "scripts/cs/meta.py",
              "scripts/cs/description.py",
              "scripts/cs/keywords.py",
              "scripts/cs/qg_report.py",
          ]

          failed = False
          for f in files:
              p = Path(f)
              if not p.exists():
                  print(f"SKIP missing: {f}")
                  continue
              try:
                  py_compile.compile(str(p), doraise=True)
                  print(f"OK: {f}")
              except Exception as e:
                  failed = True
                  print(f"FAIL: {f}: {e}")

          if failed:
              sys.exit(1)
          PY

      - name: Show build version
        run: |
          python - <<'PY'
          import pathlib
          import re
          t = pathlib.Path('scripts/build_alstyle.py').read_text(encoding='utf-8', errors='ignore')
          m = re.search(r'BUILD_[A-Z0-9_]+_VERSION\s*=\s*["\']([^"\']+)["\']', t)
          print('ALSTYLE_VERSION', m.group(1) if m else 'UNKNOWN')
          PY

      - name: Build
        run: python scripts/build_alstyle.py

      - name: Diagnostics
        if: always()
        run: |
          git status --porcelain || true
          git diff --stat || true
          ls -la docs docs/raw docs/debug || true
          [ -f docs/raw/alstyle_quality_gate.txt ] && cat docs/raw/alstyle_quality_gate.txt || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alstyle-artifacts
          path: |
            docs/alstyle.yml
            docs/raw/alstyle.yml
            docs/raw/alstyle_quality_gate.txt
          if-no-files-found: warn

      - name: Commit and push changes
        if: success()
        run: |
          git add docs/alstyle.yml docs/raw/alstyle.yml docs/raw/alstyle_quality_gate.txt || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Build AlStyle feed"
          git push
