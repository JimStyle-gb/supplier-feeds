name: Build_VTT

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1,10,20 * *"

jobs:
  build-vtt:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      TZ: Asia/Almaty
      VTT_BASE_URL: https://b2b.vtt.ru/
      VTT_LOGIN: ${{ secrets.VTT_LOGIN }}
      VTT_PASSWORD: ${{ secrets.VTT_PASSWORD }}
      VTT_MAX_LISTING_PAGES: 5000
      VTT_MAX_WORKERS: 10
      VTT_MAX_CRAWL_MINUTES: 90
      VTT_REQUEST_DELAY_MS: 40
      VTT_SOFTFAIL: "false"
      OUT_FILE: docs/vtt.yml
      RAW_OUT_FILE: docs/raw/vtt.yml
      VTT_QG_REPORT: docs/raw/vtt_quality_gate.txt

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Compile VTT files
        run: |
          python -m py_compile \
            scripts/build_vtt.py \
            scripts/suppliers/vtt/__init__.py \
            scripts/suppliers/vtt/source.py \
            scripts/suppliers/vtt/builder.py \
            scripts/suppliers/vtt/quality_gate.py

      - name: Run VTT build
        run: python scripts/build_vtt.py

      - name: Upload VTT raw artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vtt-build-output
          path: |
            docs/raw/vtt.yml
            docs/raw/vtt_quality_gate.txt
