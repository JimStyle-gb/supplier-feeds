name: Build_VTT

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1,10,20 * *"

permissions:
  contents: write

jobs:
  build_vtt_shards:
    name: build-vtt-${{ matrix.shard_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    concurrency:
      group: build_vtt_${{ matrix.shard_name }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        include:
          # Самый тяжелый блок — отдельно.
          - shard_name: shard_a
            category_codes: CARTLAS_TNR
            max_workers: 12

          # Второй по весу блок + мелкие лазерные хвосты.
          - shard_name: shard_b
            category_codes: CARTLAS_ORIG,TNR_WASTETON,CARTLAS_COPY,CARTLAS_PRINT,TNR_REFILL
            max_workers: 10

          # Средний блок.
          - shard_name: shard_c
            category_codes: CARTINJ_ORIG,DRM_UNIT,DEV_DEV
            max_workers: 10

          # Легкий / смешанный хвост.
          - shard_name: shard_d
            category_codes: INK_COMMON,PARTSPRINT_DEVUN,CARTINJ_PRNTHD,CARTINJ_Refill,CARTMAT_CART,DRM_CRT
            max_workers: 8

    env:
      TZ: Asia/Almaty
      VTT_BASE_URL: https://b2b.vtt.ru/
      VTT_LOGIN: ${{ secrets.VTT_LOGIN }}
      VTT_PASSWORD: ${{ secrets.VTT_PASSWORD }}

      VTT_BUILD_MODE: shard
      VTT_SHARD_NAME: ${{ matrix.shard_name }}
      VTT_CATEGORY_CODES: ${{ matrix.category_codes }}

      # Аккуратная нагрузка на каждый shard; ускорение за счет лучшего баланса.
      VTT_REQUEST_DELAY_MS: 8
      VTT_MAX_LISTING_PAGES: 5000
      VTT_MAX_WORKERS: ${{ matrix.max_workers }}
      VTT_MAX_CRAWL_MINUTES: 90
      VTT_SOFTFAIL: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests beautifulsoup4 lxml pyyaml python-dateutil openpyxl
          fi

      - name: Prepare folders
        run: mkdir -p docs/debug/vtt_shards

      - name: Smoke test
        run: |
          python -m py_compile \
            scripts/build_vtt.py \
            scripts/suppliers/vtt/source.py \
            scripts/suppliers/vtt/builder.py \
            scripts/suppliers/vtt/quality_gate.py

      - name: Build shard
        run: python scripts/build_vtt.py

      - name: Upload shard artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vtt-${{ matrix.shard_name }}
          path: docs/debug/vtt_shards/${{ matrix.shard_name }}.json

  merge_vtt:
    name: merge-vtt
    needs: build_vtt_shards
    runs-on: ubuntu-latest
    timeout-minutes: 180
    concurrency:
      group: build_vtt_merge
      cancel-in-progress: true

    env:
      TZ: Asia/Almaty
      VTT_BASE_URL: https://b2b.vtt.ru/
      VTT_BUILD_MODE: merge

      OUT_FILE: docs/vtt.yml
      RAW_OUT_FILE: docs/raw/vtt.yml
      VTT_QG_REPORT: docs/raw/vtt_quality_gate.txt

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests beautifulsoup4 lxml pyyaml python-dateutil openpyxl
          fi

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare folders
        run: |
          mkdir -p docs docs/raw docs/debug/vtt_shards
          rm -f docs/debug/vtt_shards/*.json || true

      - name: Download shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vtt-shard_*
          merge-multiple: true
          path: docs/debug/vtt_shards

      - name: Smoke test
        run: |
          python -m py_compile \
            scripts/build_vtt.py \
            scripts/suppliers/vtt/source.py \
            scripts/suppliers/vtt/builder.py \
            scripts/suppliers/vtt/quality_gate.py

      - name: Snapshot previous feed
        run: |
          mkdir -p /tmp docs docs/raw
          if [ -f docs/vtt.yml ]; then
            cp -f docs/vtt.yml /tmp/prev_feed.yml
          else
            : > /tmp/prev_feed.yml
          fi

      - name: Merge shards + build final feeds
        run: python scripts/build_vtt.py

      - name: Diagnostics
        run: |
          git status --porcelain || true
          git diff --stat || true
          ls -la docs docs/raw docs/debug/vtt_shards || true
          wc -c docs/vtt.yml docs/raw/vtt.yml 2>/dev/null || true
          [ -f docs/raw/vtt_quality_gate.txt ] && sed -n '1,260p' docs/raw/vtt_quality_gate.txt || true

      - name: Update FEED_META build time + next run
        run: |
          norm_hash() {
            local f="$1"
            if [ ! -f "$f" ]; then
              echo ""
              return 0
            fi
            sed '/<!--FEED_META/,/-->/d' "$f" | sed '/^<yml_catalog date=/d' | md5sum | awk '{print $1}'
          }

          OLD_HASH=$(norm_hash /tmp/prev_feed.yml)
          NEW_HASH=$(norm_hash docs/vtt.yml)

          NO_CHANGES=0
          if [ -n "$OLD_HASH" ] && [ -n "$NEW_HASH" ] && [ "$OLD_HASH" = "$NEW_HASH" ]; then
            NO_CHANGES=1
          fi

          TS=$(TZ='Asia/Almaty' date '+%Y-%m-%d %H:%M:%S')
          NOTE=""
          if [ "$NO_CHANGES" -eq 1 ]; then
            NOTE=" (не было изменений)"
          fi

          NOW_DOM=$(TZ='Asia/Almaty' date '+%-d')
          NOW_HMS=$(TZ='Asia/Almaty' date '+%H%M%S')
          TODAY=$(TZ='Asia/Almaty' date '+%Y-%m-%d')

          if [ "$NOW_DOM" -lt 10 ]; then
            NEXT_DATE=$(TZ='Asia/Almaty' date -d "$(date +%Y-%m-10)" '+%Y-%m-%d')
            if [ "$NOW_DOM" -eq 1 ] && [ "$NOW_HMS" -lt "050000" ]; then
              NEXT_DATE="$TODAY"
            elif [ "$NOW_DOM" -eq 1 ] && [ "$NOW_HMS" -ge "050000" ]; then
              NEXT_DATE=$(TZ='Asia/Almaty' date -d "$(date +%Y-%m-10)" '+%Y-%m-%d')
            fi
          elif [ "$NOW_DOM" -lt 20 ]; then
            NEXT_DATE=$(TZ='Asia/Almaty' date -d "$(date +%Y-%m-20)" '+%Y-%m-%d')
            if [ "$NOW_DOM" -eq 10 ] && [ "$NOW_HMS" -lt "050000" ]; then
              NEXT_DATE="$TODAY"
            fi
          else
            NEXT_DATE=$(TZ='Asia/Almaty' date -d "$(date +%Y-%m-01 next month)" '+%Y-%m-%d')
            if [ "$NOW_DOM" -eq 20 ] && [ "$NOW_HMS" -lt "050000" ]; then
              NEXT_DATE="$TODAY"
            fi
          fi

          NEXT_RUN="${NEXT_DATE} 05:00:00"

          for F in docs/vtt.yml docs/raw/vtt.yml; do
            if [ ! -f "$F" ]; then
              continue
            fi

            sed -i -E "s/^<yml_catalog date=\"[^\"]+\">/<yml_catalog date=\"${TS}\">/" "$F" || true

            tmp="$F.__tmp"
            : > "$tmp"

            while IFS= read -r ln; do
              if [[ "$ln" == Время\ сборки\ \(Алматы\)* ]]; then
                left="${ln%%|*}"
                echo "${left}| ${TS}${NOTE}" >> "$tmp"
              elif [[ "$ln" == Ближайшая\ сборка\ \(Алматы\)* ]]; then
                left="${ln%%|*}"
                echo "${left}| ${NEXT_RUN}" >> "$tmp"
              else
                if [ "$NO_CHANGES" -eq 0 ]; then
                  echo "${ln// (не было изменений)/}" >> "$tmp"
                else
                  echo "$ln" >> "$tmp"
                fi
              fi
            done < "$F"

            mv "$tmp" "$F"
          done

      - name: Commit & push docs/vtt.yml
        run: |
          git add docs/vtt.yml docs/raw/vtt.yml
          if [ -f docs/raw/vtt_quality_gate.txt ]; then
            git add docs/raw/vtt_quality_gate.txt
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "build: vtt feed"
          git pull --rebase --autostash
          git push

      - name: Upload VTT build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vtt-build-output
          path: |
            docs/vtt.yml
            docs/raw/vtt.yml
            docs/raw/vtt_quality_gate.txt
