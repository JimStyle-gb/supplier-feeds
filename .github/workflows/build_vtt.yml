name: Build_VTT

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  build_vtt:
    runs-on: ubuntu-latest
    concurrency:
      group: build_vtt
      cancel-in-progress: true
    env:
      VTT_LOGIN: ${{ secrets.VTT_LOGIN }}
      VTT_PASSWORD: ${{ secrets.VTT_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests beautifulsoup4 lxml pyyaml python-dateutil openpyxl
          fi

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Smoke test
        run: |
          python -m py_compile scripts/cs/core.py scripts/build_vtt.py scripts/debug_vtt_missing_prices.py

      - name: Check required secrets
        run: |
          if [ -z "$VTT_LOGIN" ] || [ -z "$VTT_PASSWORD" ]; then
            echo "Missing VTT_LOGIN or VTT_PASSWORD GitHub secret"
            exit 1
          fi

      - name: "Gate by day-of-month (Asia/Almaty: 1/10/20)"
        id: gate
        if: ${{ github.event_name == 'schedule' }}
        run: |
          day=$(TZ=Asia/Almaty date +%d)
          if [ "$day" = "01" ] || [ "$day" = "10" ] || [ "$day" = "20" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Almaty day=$day -> run=true"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Almaty day=$day -> run=false"
          fi

      - name: Debug VTT missing prices
        if: ${{ github.event_name != 'schedule' || steps.gate.outputs.run == 'true' }}
        env:
          VTT_PROBE_LIMIT: "0"
        run: |
          python scripts/debug_vtt_missing_prices.py

      - name: Diagnostics
        if: ${{ github.event_name != 'schedule' || steps.gate.outputs.run == 'true' }}
        run: |
          git status --porcelain || true
          ls -la docs docs/raw || true
          sed -n '1,40p' docs/raw/vtt_missing_prices_summary.txt 2>/dev/null || true
          sed -n '1,220p' docs/raw/vtt_missing_prices.yml 2>/dev/null || true

      - name: Upload missing-prices artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: vtt-missing-prices
          path: |
            docs/raw/vtt_missing_prices.yml
            docs/raw/vtt_missing_prices_summary.txt
          if-no-files-found: warn
