name: Build_AkCent

on:
  workflow_dispatch:
  schedule:
    # 02:00 Asia/Almaty = 21:00 UTC (daily)
    - cron: '0 21 * * *'

permissions:
  contents: write

jobs:
  build_akcent:
    runs-on: ubuntu-latest
    concurrency:
      group: build_akcent
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests beautifulsoup4 lxml pyyaml python-dateutil openpyxl
          fi

      - name: Configure git identity (GitHub Actions bot)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Smoke test (py_compile)
        run: |
          python -m py_compile scripts/cs/core.py scripts/build_akcent.py

      - name: Snapshot previous feed (for no-change detection)
        run: |
          mkdir -p /tmp/cs_prev
          if [ -f docs/akcent.yml ]; then
            cp docs/akcent.yml /tmp/cs_prev/akcent.yml
          fi

      - name: Build feed (akcent) + show which script is used
        run: |
          python -c "import hashlib,pathlib; p=pathlib.Path('scripts/build_akcent.py'); print('AKCENT_PY_MD5', hashlib.md5(p.read_bytes()).hexdigest()); print('AKCENT_PY_BYTES', p.stat().st_size)"
          python scripts/build_akcent.py

      - name: Update FEED_META build time + next run (and mark no-changes)
        run: |
          python - <<'PY'
          from __future__ import annotations
          import pathlib
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo

          tz = ZoneInfo("Asia/Almaty")
          now = datetime.now(tz).replace(tzinfo=None)
          build_str = now.strftime("%Y-%m-%d %H:%M:%S")

          # Next run: daily 02:00 Almaty (same as cron above)
          cand = now.replace(hour=2, minute=0, second=0, microsecond=0)
          if cand <= now:
            cand = cand + timedelta(days=1)
          next_str = cand.strftime("%Y-%m-%d %H:%M:%S")

          prev = pathlib.Path("/tmp/cs_prev/akcent.yml")
          cur = pathlib.Path("docs/akcent.yml")

          prev_bytes = prev.read_bytes() if prev.exists() else b""
          cur_bytes = cur.read_bytes() if cur.exists() else b""
          changed = (prev_bytes != cur_bytes)

          text = cur.read_text(encoding="utf-8", errors="ignore").splitlines(True)
          out = []

          for ln in text:
            lstrip = ln.lstrip()
            pref = ln[:len(ln) - len(lstrip)]  # keep indent (if any)

            if lstrip.startswith("Время сборки (Алматы)"):
              note = "" if changed else " (не было изменений)"
              left = lstrip.split("|", 1)[0].rstrip()
              out.append(f"{pref}{left} | {build_str}{note}\n")
              continue

            if lstrip.startswith("Ближайшая сборка (Алматы)"):
              left = lstrip.split("|", 1)[0].rstrip()
              out.append(f"{pref}{left} | {next_str}\n")
              continue

            out.append(ln)

          cur.write_text("".join(out), encoding="utf-8")
          print(f"[feedmeta] changed={'yes' if changed else 'no'} build={build_str} next={next_str}")
          PY

      - name: Commit & push docs/akcent.yml docs/raw/akcent.yml
        run: |
          git add docs/akcent.yml docs/raw/akcent.yml
          if git diff --cached --quiet; then
            echo "No changes to commit (even after FEED_META update) — creating heartbeat."
            date -u +"%Y-%m-%dT%H:%M:%SZ" > docs/raw/akcent_last_run.txt
            git add docs/raw/akcent_last_run.txt
          fi
          git commit -m "build: akcent feed"
          git pull --rebase --autostash
          git push
