name: Build_AkCent

on:
  workflow_dispatch:
  schedule:
    # Алматы UTC+5 → 02:00 local = 21:00 UTC предыдущего дня
    - cron: '0 21 * * *'

permissions:
  contents: write

jobs:
  build_akcent:
    runs-on: ubuntu-latest
    concurrency:
      group: build_akcent
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests beautifulsoup4 lxml pyyaml python-dateutil openpyxl
          fi

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare folders
        run: |
          mkdir -p docs docs/raw scripts/suppliers/akcent/config

      - name: Smoke test (py_compile existing files only)
        run: |
          python - <<'PY'
          from pathlib import Path
          import py_compile
          import sys

          files = [
              "scripts/cs/core.py",
              "scripts/cs/description.py",
              "scripts/cs/keywords.py",
              "scripts/cs/meta.py",
              "scripts/cs/policy.py",
              "scripts/cs/pricing.py",
              "scripts/cs/util.py",
              "scripts/cs/validators.py",
              "scripts/cs/writer.py",
              "scripts/build_akcent.py",
              "scripts/suppliers/__init__.py",
              "scripts/suppliers/akcent/__init__.py",
              "scripts/suppliers/akcent/models.py",
              "scripts/suppliers/akcent/source.py",
              "scripts/suppliers/akcent/filtering.py",
              "scripts/suppliers/akcent/normalize.py",
              "scripts/suppliers/akcent/pictures.py",
              "scripts/suppliers/akcent/params_xml.py",
              "scripts/suppliers/akcent/desc_clean.py",
              "scripts/suppliers/akcent/desc_extract.py",
              "scripts/suppliers/akcent/compat.py",
              "scripts/suppliers/akcent/builder.py",
              "scripts/suppliers/akcent/diagnostics.py",
              "scripts/suppliers/akcent/quality_gate.py",
          ]

          failed = False
          for f in files:
              p = Path(f)
              if not p.exists():
                  print(f"SKIP missing: {f}")
                  continue
              try:
                  py_compile.compile(str(p), doraise=True)
                  print(f"OK: {f}")
              except Exception as e:
                  failed = True
                  print(f"FAIL: {f}: {e}")

          if failed:
              sys.exit(1)
          PY

      - name: Show build version
        run: |
          python - <<'PY'
          import pathlib
          import re
          t = pathlib.Path('scripts/build_akcent.py').read_text(encoding='utf-8', errors='ignore')
          m = re.search(r"BUILD_AKCENT_VERSION\s*=\s*[\"\']([^\"\']+)[\"\']", t)
          print('AKCENT_VERSION', m.group(1) if m else 'UNKNOWN')
          PY

      - name: Snapshot previous feed
        run: |
          mkdir -p /tmp docs docs/raw
          if [ -f docs/akcent.yml ]; then
            cp -f docs/akcent.yml /tmp/prev_feed.yml
          else
            : > /tmp/prev_feed.yml
          fi

      - name: Build feed (akcent)
        env:
          TZ: Asia/Almaty
        run: |
          python scripts/build_akcent.py

      - name: Diagnostics
        run: |
          git status --porcelain || true
          git diff --stat || true
          ls -la docs docs/raw || true
          wc -c docs/akcent.yml docs/raw/akcent.yml 2>/dev/null || true
          [ -f docs/raw/akcent_watch.txt ] && sed -n '1,200p' docs/raw/akcent_watch.txt || true
          [ -f docs/raw/akcent_quality_gate.txt ] && sed -n '1,260p' docs/raw/akcent_quality_gate.txt || true

      - name: Update FEED_META build time + next run
        run: |
          norm_hash() {
            local f="$1"
            if [ ! -f "$f" ]; then
              echo ""
              return 0
            fi
            sed '/<!--FEED_META/,/-->/d' "$f" | sed '/^<yml_catalog date=/d' | md5sum | awk '{print $1}'
          }

          OLD_HASH=$(norm_hash /tmp/prev_feed.yml)
          NEW_HASH=$(norm_hash docs/akcent.yml)

          NO_CHANGES=0
          if [ -n "$OLD_HASH" ] && [ -n "$NEW_HASH" ] && [ "$OLD_HASH" = "$NEW_HASH" ]; then
            NO_CHANGES=1
          fi

          TS=$(TZ='Asia/Almaty' date '+%Y-%m-%d %H:%M:%S')
          NOTE=""
          if [ "$NO_CHANGES" -eq 1 ]; then
            NOTE=" (не было изменений)"
          fi

          TODAY=$(TZ='Asia/Almaty' date '+%Y-%m-%d')
          NOW_HMS=$(TZ='Asia/Almaty' date '+%H%M%S')
          if [ "$NOW_HMS" -ge "020000" ]; then
            NEXT_DATE=$(TZ='Asia/Almaty' date -d 'tomorrow' '+%Y-%m-%d')
          else
            NEXT_DATE="$TODAY"
          fi
          NEXT_RUN="${NEXT_DATE} 02:00:00"

          for F in docs/akcent.yml docs/raw/akcent.yml; do
            if [ ! -f "$F" ]; then
              continue
            fi

            sed -i -E "s/^<yml_catalog date=\"[^\"]+\">/<yml_catalog date=\"${TS}\">/" "$F" || true

            tmp="$F.__tmp"
            : > "$tmp"

            while IFS= read -r ln; do
              if [[ "$ln" == Время\ сборки\ \(Алматы\)* ]]; then
                left="${ln%%|*}"
                echo "${left}| ${TS}${NOTE}" >> "$tmp"
              elif [[ "$ln" == Ближайшая\ сборка\ \(Алматы\)* ]]; then
                left="${ln%%|*}"
                echo "${left}| ${NEXT_RUN}" >> "$tmp"
              else
                if [ "$NO_CHANGES" -eq 0 ]; then
                  echo "${ln// (не было изменений)/}" >> "$tmp"
                else
                  echo "$ln" >> "$tmp"
                fi
              fi
            done < "$F"

            mv "$tmp" "$F"
          done

          echo "CS_NO_CHANGES=$NO_CHANGES" >> "$GITHUB_ENV"

      - name: Commit & push docs/akcent.yml
        run: |
          git add docs/akcent.yml docs/raw/akcent.yml
          if [ -f docs/raw/akcent_watch.txt ]; then
            git add docs/raw/akcent_watch.txt
          fi
          if [ -f docs/raw/akcent_quality_gate.txt ]; then
            git add docs/raw/akcent_quality_gate.txt
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "build: akcent feed"
          git pull --rebase --autostash
          git push
