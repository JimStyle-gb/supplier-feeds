name: Build_AkCent

on:
  workflow_dispatch:
  schedule:
    # Алматы UTC+5 → 02:00 local = 21:00 UTC предыдущего дня
    - cron: "0 21 * * *"

jobs:
  build-akcent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Prepare folders
        run: |
          mkdir -p docs
          mkdir -p docs/raw
          mkdir -p scripts/suppliers/akcent/config

      - name: Smoke test / py_compile
        run: |
          python -m py_compile \
            scripts/cs/core.py \
            scripts/cs/writer.py \
            scripts/cs/validators.py \
            scripts/cs/util.py \
            scripts/cs/pricing.py \
            scripts/cs/meta.py \
            scripts/cs/policy.py \
            scripts/cs/description.py \
            scripts/cs/keywords.py \
            scripts/build_akcent.py \
            scripts/suppliers/akcent/source.py \
            scripts/suppliers/akcent/filtering.py \
            scripts/suppliers/akcent/normalize.py \
            scripts/suppliers/akcent/pictures.py \
            scripts/suppliers/akcent/params_xml.py \
            scripts/suppliers/akcent/desc_clean.py \
            scripts/suppliers/akcent/desc_extract.py \
            scripts/suppliers/akcent/compat.py \
            scripts/suppliers/akcent/builder.py \
            scripts/suppliers/akcent/diagnostics.py \
            scripts/suppliers/akcent/quality_gate.py

      - name: Show build version
        run: |
          python -c "import pathlib,re; t=pathlib.Path('scripts/build_akcent.py').read_text(encoding='utf-8', errors='ignore'); m=re.search(r'BUILD_AKCENT_VERSION\s*=\s*[\"\']([^\"\']+)[\"\']', t); print('AKCENT_VERSION', m.group(1) if m else 'UNKNOWN')"

      - name: Run build
        env:
          TZ: Asia/Almaty
        run: |
          python scripts/build_akcent.py

      - name: Validate output files exist
        run: |
          test -f docs/akcent.yml
          test -f docs/raw/akcent.yml
          echo "OK: output files created"

      - name: Print output stats
        run: |
          python - << 'PY'
          import pathlib, hashlib
          for p in ['docs/akcent.yml', 'docs/raw/akcent.yml']:
              fp = pathlib.Path(p)
              data = fp.read_bytes()
              print(p, 'bytes=', len(data), 'md5=', hashlib.md5(data).hexdigest())
          PY

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: akcent-feed
          path: |
            docs/akcent.yml
            docs/raw/akcent.yml
          if-no-files-found: error
