name: Build_AkCent

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC. 21:00 UTC = 02:00 Asia/Almaty
    - cron: '0 21 * * *'

permissions:
  contents: write

jobs:
  build_akcent:
    runs-on: ubuntu-latest
    concurrency:
      group: build_akcent
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests beautifulsoup4 lxml pyyaml python-dateutil openpyxl
          fi

      - name: Configure git identity (GitHub Actions bot)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Smoke test (py_compile)
        run: |
          python -m py_compile scripts/cs/core.py scripts/build_akcent.py

      - name: Snapshot previous feed (for no-change detection)
        run: |
          mkdir -p /tmp/cs_prev
          cp -f docs/akcent.yml /tmp/cs_prev/akcent.yml 2>/dev/null || true

      - name: Build feed (akcent) + show which script is used
        run: |
          python -c "import hashlib,pathlib; p=pathlib.Path('scripts/build_akcent.py'); print('AKCENT_PY_MD5', hashlib.md5(p.read_bytes()).hexdigest()); print('AKCENT_PY_BYTES', p.stat().st_size)"
          python -c "import pathlib; t=pathlib.Path('scripts/build_akcent.py').read_text(encoding='utf-8', errors='ignore'); print('HAS_ENRICH', 'def _ac_enrich_codes_and_compat' in t); print('CALLS_ENRICH', 'params = _ac_enrich_codes_and_compat' in t)"
          python scripts/build_akcent.py

      - name: Update FEED_META + yml_catalog date (docs + raw)
        run: |
          norm_hash() {
            local f="$1"
            if [ ! -f "$f" ]; then
              echo ""
              return 0
            fi
            sed '/<!--FEED_META/,/-->/d' "$f" | sed '/^<yml_catalog date=/d' | md5sum | awk '{print $1}'
          }

          OLD_HASH=$(norm_hash /tmp/cs_prev/akcent.yml)
          NEW_HASH=$(norm_hash docs/akcent.yml)
          NO_CHANGES=0
          if [ -n "$OLD_HASH" ] && [ -n "$NEW_HASH" ] && [ "$OLD_HASH" = "$NEW_HASH" ]; then
            NO_CHANGES=1
          fi

          TS=$(TZ='Asia/Almaty' date '+%Y-%m-%d %H:%M:%S')
          NOTE=""
          if [ "$NO_CHANGES" -eq 1 ]; then
            NOTE=" (не было изменений)"
          fi

          # Next run: daily 02:00 Almaty
          NOW_EPOCH=$(TZ='Asia/Almaty' date +%s)
          TODAY=$(TZ='Asia/Almaty' date '+%Y-%m-%d')
          CAND_EPOCH=$(TZ='Asia/Almaty' date -d "${TODAY} 02:00:00" +%s)
          if [ "$CAND_EPOCH" -le "$NOW_EPOCH" ]; then
            NEXT_EPOCH=$(TZ='Asia/Almaty' date -d "${TODAY} 02:00:00 + 1 day" +%s)
          else
            NEXT_EPOCH="$CAND_EPOCH"
          fi
          NEXT_RUN=$(TZ='Asia/Almaty' date -d "@${NEXT_EPOCH}" '+%Y-%m-%d %H:%M:%S')

          META_TIME_PREFIX="Время сборки (Алматы)                      | "
          META_NEXT_PREFIX="Ближайшая сборка (Алматы)                  | "

          for F in docs/akcent.yml docs/raw/akcent.yml; do
            if [ ! -f "$F" ]; then
              continue
            fi

            sed -i -E "s/^<yml_catalog date=\"[^\"]+\">/<yml_catalog date=\"${TS}\">/" "$F" || true

            tmp="$F.__tmp"
            : > "$tmp"
            while IFS= read -r ln; do
              if [[ "$ln" == Время\ сборки\ \(Алматы\)* ]]; then
                echo "${META_TIME_PREFIX}${TS}${NOTE}" >> "$tmp"
                continue
              fi
              if [[ "$ln" == Ближайшая\ сборка\ \(Алматы\)* ]]; then
                echo "${META_NEXT_PREFIX}${NEXT_RUN}" >> "$tmp"
                continue
              fi
              if [ "$NO_CHANGES" -eq 0 ]; then
                echo "${ln// (не было изменений)/}" >> "$tmp"
              else
                echo "$ln" >> "$tmp"
              fi
            done < "$F"
            mv "$tmp" "$F"
          done

          echo "[feedmeta] no_changes=$NO_CHANGES ts=$TS next=$NEXT_RUN"

      - name: Commit & push (docs + raw)
        run: |
          git add docs/akcent.yml docs/raw/akcent.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "build: akcent feed"
          git pull --rebase --autostash
          git push
