name: Build_NVPrint

on:
  workflow_dispatch:
  schedule:
    - cron: '0 23 * * *'

permissions:
  contents: write
jobs:
  build_nvprint:
    runs-on: ubuntu-latest
    concurrency:
      group: build_nvprint
      cancel-in-progress: true
    env:
      NVPRINT_LOGIN: ${{ secrets.NVPRINT_LOGIN }}
      NVPRINT_PASSWORD: ${{ secrets.NVPRINT_PASSWORD }}
      NVPRINT_XML_URL: "https://api.nvprint.ru/api/hs/getprice/398/881105302369/none/?format=xml&getallinfo=true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Snapshot previous feeds
        run: |
          cp -f docs/nvprint.yml /tmp/prev_feed.yml 2>/dev/null || true
          cp -f docs/raw/nvprint.yml /tmp/prev_raw.yml 2>/dev/null || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests beautifulsoup4 lxml pyyaml python-dateutil openpyxl
          fi

      - name: Configure git identity (GitHub Actions bot)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Smoke test (py_compile)
        run: |
          python -m py_compile scripts/cs/core.py scripts/build_nvprint.py
      - name: Check required env
        run: |
          if [ -z "${NVPRINT_LOGIN}" ]; then echo "NVPRINT_LOGIN is empty. Set repository secret NVPRINT_LOGIN."; exit 1; fi
          if [ -z "${NVPRINT_PASSWORD}" ]; then echo "NVPRINT_PASSWORD is empty. Set repository secret NVPRINT_PASSWORD."; exit 1; fi
          if [ -z "${NVPRINT_XML_URL}" ]; then echo "NVPRINT_XML_URL is empty in workflow env."; exit 1; fi

      - name: "Gate by day-of-month (Asia/Almaty: 1/10/20)"
        id: gate
        if: github.event_name == 'schedule'
        run: |
          day=$(TZ=Asia/Almaty date +%d)
          if [ "$day" = "01" ] || [ "$day" = "10" ] || [ "$day" = "20" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Almaty day=$day -> run=true"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Almaty day=$day -> run=false"
          fi

      - name: Build feed (nvprint)
        if: github.event_name != 'schedule' || steps.gate.outputs.run == 'true'
        run: |
          python scripts/build_nvprint.py


      - name: Diagnostics (git status / diff / sizes)
        if: github.event_name != 'schedule' || steps.gate.outputs.run == 'true'
        run: |
          git status --porcelain
          git diff --stat || true
          ls -la docs docs/raw || true
          wc -c docs/nvprint.yml docs/raw/nvprint.yml 2>/dev/null || true

      - name: Update FEED_META build time (and mark no-changes)
        if: github.event_name != 'schedule' || steps.gate.outputs.run == 'true'
        run: |
          python - <<'PY'
import hashlib, pathlib, os
def norm(path: str) -> bytes | None:
    p = pathlib.Path(path)
    if not p.exists():
        return None
    lines = p.read_text(encoding='utf-8', errors='ignore').splitlines()
    out = []
    skip = False
    for ln in lines:
        if ln.startswith('<yml_catalog date='):
            continue
        if ln.strip() == '<!--FEED_META':
            skip = True
            continue
        if skip:
            if ln.strip() == '-->':
                skip = False
            continue
        out.append(ln)
    return ('\n'.join(out) + '\n').encode('utf-8')
old = norm('/tmp/prev_feed.yml')
new = norm('docs/nvprint.yml')
no_changes = False
if old is not None and new is not None:
    no_changes = hashlib.md5(old).digest() == hashlib.md5(new).digest()
note = ' (не было изменений)' if no_changes else ''
ts = os.popen("TZ='Asia/Almaty' date '+%Y-%m-%d %H:%M:%S'").read().strip()
def patch(path: str) -> None:
    p = pathlib.Path(path)
    if not p.exists():
        return
    lines = p.read_text(encoding='utf-8', errors='ignore').splitlines()
    out = []
    for ln in lines:
        if ln.startswith('Время сборки (Алматы)'):
            left = ln.split('|', 1)[0] if '|' in ln else 'Время сборки (Алматы)                      '
            out.append(f"{left}| {ts}{note}")
        else:
            if '(не было изменений)' in ln and not no_changes:
                out.append(ln.replace(' (не было изменений)', ''))
            else:
                out.append(ln)
    p.write_text('\n'.join(out) + '\n', encoding='utf-8')
for pth in ['docs/nvprint.yml', 'docs/raw/nvprint.yml']:
    patch(pth)
print('CS_NO_CHANGES=' + ('1' if no_changes else '0'))
PY

      - name: Commit & push docs/nvprint.yml (time always updates)
        if: github.event_name != 'schedule' || steps.gate.outputs.run == 'true'
        run: |
          git add docs/nvprint.yml docs/raw/nvprint.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "build: nvprint feed"
          git pull --rebase --autostash
          git push

