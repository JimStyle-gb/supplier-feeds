name: Build_CopyLine

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'

permissions:
  contents: write

jobs:
  build_copyline:
    runs-on: ubuntu-latest
    concurrency:
      group: build_copyline
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests beautifulsoup4 lxml pyyaml python-dateutil openpyxl
          fi

      - name: Configure git identity (GitHub Actions bot)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Smoke test (py_compile)
        run: |
          python -m py_compile scripts/cs/core.py scripts/build_copyline.py

      - name: Snapshot previous feed (for no-change detection)
        run: |
          mkdir -p /tmp
          if [ -f docs/copyline.yml ]; then
            cp -f docs/copyline.yml /tmp/prev_feed.yml
          else
            : > /tmp/prev_feed.yml
          fi

      - name: "Gate by day-of-month (Asia/Almaty: 1/10/20)"
        id: gate
        if: github.event_name == 'schedule'
        run: |
          day=$(TZ=Asia/Almaty date +%d)
          if [ "$day" = "01" ] || [ "$day" = "10" ] || [ "$day" = "20" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Almaty day=$day -> run=true"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Almaty day=$day -> run=false"
          fi

      - name: Build feed (copyline)
        if: github.event_name != 'schedule' || steps.gate.outputs.run == 'true'
        run: |
          python scripts/build_copyline.py

      - name: Diagnostics (git status / diff / sizes)
        if: github.event_name != 'schedule' || steps.gate.outputs.run == 'true'
        run: |
          git status --porcelain || true
          git diff --stat || true
          ls -la docs docs/raw || true
          wc -c docs/copyline.yml docs/raw/copyline.yml 2>/dev/null || true

      - name: Update FEED_META build time + next run (and mark no-changes)
        if: github.event_name != 'schedule' || steps.gate.outputs.run == 'true'
        run: |
          # Считаем, изменились ли офферы (игнорируем <yml_catalog date=...> и блок FEED_META)
          norm_hash() {
            local f="$1"
            if [ ! -f "$f" ]; then
              echo ""
              return 0
            fi
            sed '/<!--FEED_META/,/-->/d' "$f" | sed '/^<yml_catalog date=/d' | md5sum | awk '{print $1}'
          }
          OLD_HASH=$(norm_hash /tmp/prev_feed.yml)
          NEW_HASH=$(norm_hash docs/copyline.yml)
          NO_CHANGES=0
          if [ -n "$OLD_HASH" ] && [ -n "$NEW_HASH" ] && [ "$OLD_HASH" = "$NEW_HASH" ]; then
            NO_CHANGES=1
          fi

          # Текущее локальное время Алматы
          TS=$(TZ='Asia/Almaty' date '+%Y-%m-%d %H:%M:%S')
          NOTE=""
          if [ "$NO_CHANGES" -eq 1 ]; then
            NOTE=" (не было изменений)"
          fi

          # Следующий запуск (только 1/10/20 числа, в 03:00:00 по Алматы)
          NOW_EPOCH=$(TZ='Asia/Almaty' date +%s)
          NEXT_RUN=""
          for i in $(seq 0 45); do
            CAND_DATE=$(TZ='Asia/Almaty' date -d "+${i} day" '+%Y-%m-%d')
            DOM=$(TZ='Asia/Almaty' date -d "${CAND_DATE}" '+%d')
            if [ "$DOM" != "01" ] && [ "$DOM" != "10" ] && [ "$DOM" != "20" ]; then
              continue
            fi
            CAND_EPOCH=$(TZ='Asia/Almaty' date -d "${CAND_DATE} 03:00:00" +%s)
            if [ "$CAND_EPOCH" -gt "$NOW_EPOCH" ]; then
              NEXT_RUN=$(TZ='Asia/Almaty' date -d "@${CAND_EPOCH}" '+%Y-%m-%d %H:%M:%S')
              break
            fi
          done
          if [ -z "$NEXT_RUN" ]; then
            # fallback (на всякий случай)
            NEXT_RUN=$(TZ='Asia/Almaty' date -d "+50 day" '+%Y-%m-%d')" 03:00:00"
          fi

          for F in docs/copyline.yml docs/raw/copyline.yml; do
            if [ ! -f "$F" ]; then
              continue
            fi

            # 1) Обновляем <yml_catalog date="...">
            sed -i -E "s/^<yml_catalog date=\"[^\"]+\">/<yml_catalog date=\"${TS}\">/" "$F" || true

            # 2) Обновляем строки FEED_META
            tmp="$F.__tmp"
            : > "$tmp"
            while IFS= read -r ln; do
              if [[ "$ln" == Время\ сборки\ \(Алматы\)* ]]; then
                left="${ln%%|*}"
                echo "${left}| ${TS}${NOTE}" >> "$tmp"
              elif [[ "$ln" == Ближайшая\ сборка\ \(Алматы\)* ]]; then
                left="${ln%%|*}"
                echo "${left}| ${NEXT_RUN}" >> "$tmp"
              else
                # если изменения появились — убираем старую пометку
                if [ "$NO_CHANGES" -eq 0 ]; then
                  echo "${ln// (не было изменений)/}" >> "$tmp"
                else
                  echo "$ln" >> "$tmp"
                fi
              fi
            done < "$F"
            mv "$tmp" "$F"
          done

          echo "CS_NO_CHANGES=$NO_CHANGES" >> $GITHUB_ENV

      - name: Commit & push docs/copyline.yml (if changed)
        if: github.event_name != 'schedule' || steps.gate.outputs.run == 'true'
        run: |
          git add docs/copyline.yml docs/raw/copyline.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "build: copyline feed"
          git pull --rebase --autostash
          git push
