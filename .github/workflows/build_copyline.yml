name: Build_CopyLine

on:
  workflow_dispatch:
  schedule:
    - cron: '0 23 * * *'  # 04:00 Asia/Almaty

jobs:
  build-copyline:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Almaty

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Show Python version
        run: python --version

      - name: Compile shared + CopyLine files
        run: |
          python -m py_compile             scripts/build_copyline.py             scripts/cs/core.py             scripts/cs/writer.py             scripts/cs/validators.py             scripts/cs/util.py             scripts/cs/meta.py             scripts/cs/pricing.py             scripts/cs/description.py             scripts/cs/keywords.py             scripts/cs/policy.py             scripts/cs/qg_report.py             scripts/suppliers/copyline/models.py             scripts/suppliers/copyline/source.py             scripts/suppliers/copyline/filtering.py             scripts/suppliers/copyline/normalize.py             scripts/suppliers/copyline/pictures.py             scripts/suppliers/copyline/params_page.py             scripts/suppliers/copyline/desc_clean.py             scripts/suppliers/copyline/desc_extract.py             scripts/suppliers/copyline/compat.py             scripts/suppliers/copyline/builder.py             scripts/suppliers/copyline/diagnostics.py             scripts/suppliers/copyline/quality_gate.py

      - name: Build CopyLine
        run: python scripts/build_copyline.py

      - name: Upload outputs to workspace
        run: |
          test -f docs/raw/copyline.yml
          test -f docs/copyline.yml
          test -f docs/raw/copyline_quality_gate.txt

      - name: Commit updated feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/raw/copyline.yml docs/copyline.yml docs/raw/copyline_quality_gate.txt
          git diff --cached --quiet && echo "No file changes to commit" && exit 0
          git commit -m "Build CopyLine"

      - name: Push
        run: git push
