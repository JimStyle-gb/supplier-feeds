о увеличить время работы батарей критически важных устройств. Его также можно использовать для удаленной перезагрузки заблокированного оборудования или для управления запланированными отключениями и последовательными запусками. • 9SX предлагает последовательное, USB- и релейное (сухие контакты) подключение, а также дополнительный слот для дополнительной карты (Modbus, Network или Relay). 9SX также обеспечивает функцию удаленного отключения питания. Программное обеспечение Eaton Intelligent Power Software включено в каждый ИБП.]]></description>
